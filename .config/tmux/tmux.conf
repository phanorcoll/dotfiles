# If no sessions exist, create 'codehub'. If '0' exists, rename it.
if-shell "! tmux has-session 2>/dev/null" "new-session -s codehub"
if-shell "tmux has-session -t 0 2>/dev/null" "rename-session -t 0 codehub"

# =============================================
# 1. Global Options & Fixes
# =============================================

# Set prefix to Ctrl-s (Matches your preference)
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# Quality of Life
set -g mouse on
set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g escape-time 0             # zero-out escape time delay
set -g history-limit 100000      # increase history size (from default 2k)
set -g set-clipboard on          # use system clipboard
set -g status-position top       # set bar to top
set -g default-terminal "xterm-256color"
set-option -sa terminal-overrides ",xterm*:Tc"
set-option -g focus-events on
set-option -g default-terminal "tmux-256color"
set -g extended-keys-format csi-u
set -g extended-keys on

# Indexing and Renumbering
set -g base-index 1              # start indexing windows at 1
set -g pane-base-index 1         # start indexing panes at 1
set-window-option -g pane-base-index 1
set -g renumber-windows on       # reorder windows when one is closed

# Activity and Visuals
set -g monitor-activity on
set -g visual-activity off
set -g status-interval 10        # refresh status bar every 10s

# =============================================
# 2. Keybindings
# =============================================

# Reload config
unbind r
bind R source-file ~/.config/tmux/tmux.conf \; display-message " 󱓏  Config sourced"

# Vim-style pane navigation
setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Copy mode (Vi style)
# Enter Copy Mode: Press Prefix + [
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle # Changed C-b to C-v (standard)
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Window Navigation (Meta/Alt + H/L)
bind -n M-h previous-window
bind -n M-l next-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6

# Splits (stay in current directory)
bind '+' split-window -v -c "#{pane_current_path}"
bind '-' split-window -h -c "#{pane_current_path}"

# Session Management
bind N command-prompt -p "  New session name:" "new-session -d -s '%%'"
bind r command-prompt -p "  Rename session:" "rename-session '%%'"

# Close active session and switch to next
bind X confirm-before -p "Kill session #S? (y/n)" "run-shell 'tmux switch-client -n \\; kill-session -t \"#S\"'"

# =============================================
# 3. Popups (FZF & Muxie)
# =============================================

# Muxie Popup
bind-key m display-popup -w 100% -h 100% -B -E "~/go/bin/muxie"

# Session Switcher (FZF) - Fixed Preview Error
bind-key a display-popup -T " 󰈙 Active Sessions " -w 50% -h 40% -E \
    "tmux list-sessions -F '#S' | fzf --reverse --no-preview --header 'Jump to session' | xargs -I {} tmux switch-client -t {}"

# Quick New Session (Fixed Version)
bind C-n display-popup -T " 󰈙 New Session " -w 40% -h 10% -E \
    "bash -c 'read -p \"Session Name: \" name; [ -n \"\$name\" ] && tmux new-session -d -s \"\$name\" && tmux switch-client -t \"\$name\"'"

# =============================================
# 4. Plugins (TPM)
# =============================================

set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'
set -g @plugin 'omerxx/tmux-floax'

# Floax Config
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-change-path 'true'

# =============================================
# 5. Theme
# =============================================

# Style
color_fg0='#fbf1c7'
color_bg1='#3c3836'
color_bg3='#665c54'
color_blue='#458588'
color_aqua='#689d6a'
color_green='#98971a'
color_orange='#d65d0e'
color_purple='#b16286'
color_red='#cc241d'
color_yellow='#d79921'

set -g status-left-length 50
set -g status-style "fg=${color_fg0}"
set -g status-left "#[fg=${color_orange}]#[fg=${color_fg0},bg=${color_orange}]  #S #[fg=${color_orange},bg=default] "
set -g status-right "#(~/.config/tmux/scripts/cal.sh)  %d-%m-%Y |  %H:%M"
set -g window-status-current-format "#[fg=${color_yellow},bold] #[underscore]#W"
set -g window-status-format " #W"
set -g window-status-separator " "
set -g message-style "fg=${color_fg0},bg=${color_aqua},bold"
set -g pane-border-style "fg=${color_bg3}"
set -g pane-active-border-style "fg=${color_yellow}"

# Initialize TPM
run "~/.config/tmux/plugins/tpm/tpm"
